<svg viewBox="0 0 720 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="cp-ipad"><rect x="28" y="30" width="210" height="280" rx="3"/></clipPath>
    <clipPath id="cp-laptop"><rect x="376" y="36" width="316" height="198" rx="3"/></clipPath>
    <clipPath id="cp-phone"><rect x="304" y="80" width="112" height="200" rx="4"/></clipPath>
  </defs>

  <!-- IPAD (drawn first = behind) -->
  <rect x="10" y="12" width="248" height="322" rx="18" fill="#2c2c2c" stroke="#484848" stroke-width="2"/>
  <rect x="22" y="24" width="224" height="298" rx="8" fill="#111"/>
  <g clip-path="url(#cp-ipad)">
    <rect x="28" y="30" width="210" height="280" fill="#1a1a2e"/>
    <image href="ipad-screen.jpg" x="28" y="30" width="210" height="280" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <rect x="114" y="328" width="40" height="4" rx="2" fill="#555"/>
  <circle cx="134" cy="19" r="3" fill="#444"/>

  <!-- LAPTOP (drawn second = behind phone) -->
  <rect x="364" y="28" width="342" height="228" rx="12" fill="#2c2c2c" stroke="#484848" stroke-width="2"/>
  <rect x="372" y="34" width="326" height="212" rx="6" fill="#111"/>
  <g clip-path="url(#cp-laptop)">
    <rect x="376" y="36" width="316" height="198" fill="#16213e"/>
    <image href="laptop-screen.jpg" x="376" y="36" width="316" height="198" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <circle cx="535" cy="31" r="2.5" fill="#444"/>
  <rect x="360" y="255" width="350" height="12" rx="4" fill="#333" stroke="#484848" stroke-width="1.5"/>
  <rect x="340" y="266" width="390" height="8" rx="4" fill="#2a2a2a" stroke="#484848" stroke-width="1"/>
  <rect x="460" y="257" width="150" height="8" rx="3" fill="#252525"/>

  <!-- PHONE (drawn last = on top, centered overlapping both) -->
  <rect x="293" y="64" width="136" height="232" rx="20" fill="#222" stroke="#484848" stroke-width="2"/>
  <rect x="301" y="73" width="118" height="214" rx="12" fill="#111"/>
  <g clip-path="url(#cp-phone)">
    <rect x="304" y="80" width="112" height="200" fill="#0f3460"/>
    <image href="phone-screen.jpg" x="304" y="80" width="112" height="200" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <rect x="338" y="68" width="46" height="10" rx="5" fill="#222"/>
  <rect x="334" y="279" width="54" height="4" rx="2" fill="#444"/>
</svg>
